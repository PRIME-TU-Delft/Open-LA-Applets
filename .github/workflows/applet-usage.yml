name: Check book applet usage
on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-book-applets:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Scan book repositories for applet usage
        run: python scripts/check-book-applets.py
      - name: Format project
        run: pnpm format
      - name: Create pull request with updates
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update book applet usage data"
          title: "chore: update book applet usage data"
          body: "Automated update of book applet usage data and formatting."
          branch: "chore/update-book-applet-usage"
          delete-branch: true
